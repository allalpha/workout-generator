<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF3D00"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- Dumbbell bar -->
  <rect x="30" y="44" width="40" height="12" rx="3" fill="#fff"/>
  <!-- Left weight plates -->
  <rect x="18" y="34" width="14" height="32" rx="4" fill="#fff"/>
  <rect x="22" y="38" width="14" height="24" rx="2" fill="#FF6B35"/>
  <!-- Right weight plates -->
  <rect x="68" y="34" width="14" height="32" rx="4" fill="#fff"/>
  <rect x="64" y="38" width="14" height="24" rx="2" fill="#FF6B35"/>
  <!-- Grip lines (left) -->
  <line x1="32" y1="45" x2="32" y2="55" stroke="#FF6B35" stroke-width="1.5"/>
  <line x1="35" y1="45" x2="35" y2="55" stroke="#FF6B35" stroke-width="1.5"/>
  <!-- Grip lines (right) -->
  <line x1="65" y1="45" x2="65" y2="55" stroke="#FF6B35" stroke-width="1.5"/>
  <line x1="68" y1="45" x2="68" y2="55" stroke="#FF6B35" stroke-width="1.5"/>
</svg>
