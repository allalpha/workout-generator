        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {

            --yellow: #fbbf24;
            --red: #f43f5e;

        html, body {

        /* === AURORA BACKGROUND === */
        .aurora-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;

        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: auroraDrift 18s ease-in-out infinite;
        }
        .aurora-blob:nth-child(1) {
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, #8b5cf6, #6366f1, transparent);
            top: -20%; left: -10%;
            animation-delay: 0s;
        }
        .aurora-blob:nth-child(2) {
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, #f43f5e, #ec4899, transparent);
            top: 40%; right: -15%;
            animation-delay: -6s;
        }
        .aurora-blob:nth-child(3) {
            width: 55vw; height: 55vw;
            background: radial-gradient(circle, #4ade80, #38bdf8, transparent);
            bottom: -20%; left: 20%;
            animation-delay: -12s;
        }
        @keyframes auroraDrift {
            0%, 100% { transform: translate(0, 0) scale(1); }

        <!-- History -->
        <div class="history-section" id="histSec">
            <div class="history-title">📜 Workout History</div>
            <div id="histList"><p class="no-history">No workouts yet — generate your first one! 🏃</p></div>
        </div>

        <!-- Install -->
        <button class="install-btn" id="installBtn" onclick="installApp()">📲 Add to Home Screen</button>
    </div>

    <script>
    // ==================== DATA ====================
    const exercises = {
        easy: [
            { name: "Jumping Jacks", detail: "30 seconds", emoji: "⭐", reps: "Do them at your own pace", seconds: 30, rest: 15 },
            { name: "Bodyweight Squats", detail: "10 reps", emoji: "🦵", reps: "Keep your back straight", seconds: 45, rest: 20 },
            { name: "Wall Push-ups", detail: "10 reps", emoji: "🤲", reps: "Stand an arm's length from the wall", seconds: 40, rest: 20 },
            { name: "Lunges", detail: "8 each leg", emoji: "🚶", reps: "Step forward, bend both knees", seconds: 45, rest: 20 },
            { name: "Plank", detail: "20 seconds", emoji: "🧘", reps: "Keep your body in a straight line", seconds: 20, rest: 20 },
            { name: "Glute Bridges", detail: "12 reps", emoji: "🌉", reps: "Lie on back, lift hips up", seconds: 40, rest: 15 },

            { name: "March in Place", detail: "45 seconds", emoji: "🪖", reps: "Lift knees high, swing arms", seconds: 45, rest: 15 },
            { name: "Side Leg Raises", detail: "10 each", emoji: "🦿", reps: "Lie on side, lift top leg", seconds: 40, rest: 15 },
            { name: "Toe Touches", detail: "15 reps", emoji: "👆", reps: "Bend forward, touch your toes", seconds: 35, rest: 15 },
            { name: "Bird Dog", detail: "8 each side", emoji: "🐕", reps: "Extend opposite arm & leg on all fours", seconds: 40, rest: 20 },
            { name: "Wall Sit", detail: "20 seconds", emoji: "🪑", reps: "Back against wall, slide down", seconds: 20, rest: 20 },
            { name: "Cat-Cow", detail: "10 reps", emoji: "🐱", reps: "Arch and round your back", seconds: 30, rest: 15 },
        ],
        medium: [
            { name: "Push-ups", detail: "12 reps", emoji: "💪", reps: "Full push-ups — chest to ground!", seconds: 45, rest: 25 },
            { name: "Squats", detail: "20 reps", emoji: "🦵", reps: "Go deep, explode up", seconds: 50, rest: 25 },
            { name: "Mountain Climbers", detail: "30 seconds", emoji: "⛰️", reps: "Fast knees to chest in plank", seconds: 30, rest: 20 },
            { name: "Burpees", detail: "8 reps", emoji: "🔥", reps: "Squat → plank → push-up → jump!", seconds: 45, rest: 30 },
            { name: "Plank", detail: "45 seconds", emoji: "🧘", reps: "Hold it steady, no sagging", seconds: 45, rest: 25 },
            { name: "Jump Squats", detail: "10 reps", emoji: "🚀", reps: "Squat down, explode up", seconds: 40, rest: 25 },
            { name: "Bicycle Crunches", detail: "20 reps", emoji: "🚲", reps: "Elbow to opposite knee", seconds: 45, rest: 20 },
            { name: "Tricep Dips", detail: "12 reps", emoji: "🪑", reps: "Use a chair or low table", seconds: 40, rest: 25 },
            { name: "High Knees", detail: "40 seconds", emoji: "🏃", reps: "Run in place, knees above hips", seconds: 40, rest: 20 },
            { name: "Reverse Lunges", detail: "12 each", emoji: "↩️", reps: "Step backward instead of forward", seconds: 50, rest: 25 },
            { name: "Flutter Kicks", detail: "30 seconds", emoji: "🏊", reps: "Lie on back, kick legs up and down", seconds: 30, rest: 20 },
            { name: "Plank Jacks", detail: "20 reps", emoji: "🤸", reps: "Plank position, jump feet apart+together", seconds: 40, rest: 20 },
            { name: "Russian Twists", detail: "20 reps", emoji: "🥨", reps: "Sit leaning back, twist side to side", seconds: 45, rest: 20 },
            { name: "Donkey Kicks", detail: "15 each", emoji: "🦵", reps: "On all fours, kick one leg up", seconds: 40, rest: 20 },
            { name: "Star Jumps", detail: "15 reps", emoji: "⭐", reps: "Jump spreading arms and legs wide!", seconds: 35, rest: 25 },
        ],
        beast: [
            { name: "Burpees", detail: "15 reps", emoji: "💀", reps: "Full send — no half-reps!", seconds: 55, rest: 30 },
            { name: "Diamond Push-ups", detail: "10 reps", emoji: "💎", reps: "Hands together forming a diamond", seconds: 45, rest: 30 },
            { name: "Jump Lunges", detail: "12 each", emoji: "⚡", reps: "Switch legs mid-air — explosive!", seconds: 50, rest: 30 },
            { name: "Plank to Push-up", detail: "10 reps", emoji: "🔄", reps: "Plank on elbows → push up → repeat", seconds: 50, rest: 30 },
            { name: "Squat Jumps", detail: "20 reps", emoji: "🚀", reps: "Maximum height every rep", seconds: 50, rest: 35 },
            { name: "Mountain Climbers", detail: "60 seconds", emoji: "⛰️", reps: "Sprint pace — don't slow down!", seconds: 60, rest: 25 },
            { name: "Bulgarian Split Squats", detail: "10 each", emoji: "🇧🇬", reps: "Back foot on a chair, deep squat", seconds: 55, rest: 30 },
            { name: "Side Plank", detail: "30s each side", emoji: "🧘", reps: "Stack your feet, hips high", seconds: 60, rest: 25 },
            { name: "Tuck Jumps", detail: "12 reps", emoji: "🤸", reps: "Jump and pull knees to chest", seconds: 45, rest: 35 },
            { name: "Wide Push-ups", detail: "12 reps", emoji: "🤲", reps: "Hands wider than shoulder width", seconds: 45, rest: 30 },
            { name: "Crab Walk", detail: "45 seconds", emoji: "🦀", reps: "Hands and feet, belly up — move!", seconds: 45, rest: 30 },
            { name: "Superman Plank", detail: "30 seconds", emoji: "🦸", reps: "Plank but lift opposite arm & leg", seconds: 30, rest: 30 },
            { name: "Pistol Squats", detail: "5 each", emoji: "🔫", reps: "One-leg squat — use a wall for balance", seconds: 50, rest: 30 },
            { name: "Bear Crawl", detail: "30 seconds", emoji: "🐻", reps: "Crawl forward and back on hands+feet", seconds: 30, rest: 30 },
            { name: "Burpee+Tuck Jump", detail: "8 reps", emoji: "☠️", reps: "Burpee then tuck jump — ultimate!", seconds: 60, rest: 35 },
        ],
    };

    const mottoes = [
        "You're crushing it! 🔥", "Keep going, you got this! 💪", "Almost there! 🚀",
        "Stronger than you think! ⚡", "Don't stop now! 🏆", "Every rep counts! 🎯",
        "Beast mode activated! 💀", "Push through the burn! 🔥", "One. More. Rep. 🎲",
        "You're making progress! 📈", "No pain, no gain! 💎", "Legendary! 👑",
        "Stay focused, stay strong! 🧠", "This is your moment! ⭐", "Champion! 🏅",
    ];

    // ==================== STATE ====================
    let diff = 'easy';
    let workout = null;
    let history = [];
    let timerOn = false;
    let timerRun = false;
    let timerPaused = false;
    let timerInt = null;
    let exIdx = 0;
    let timeLeft = 0;
    let isRest = false;
    let soundOn = true;
    let musicOn = false;
    let totalExDone = 0;
    let todayWkts = 0;
    let musicCtx = null;
    let musicNodes = [];

    // ==================== INIT ====================
    function init() {
        loadStats(); loadHistory();
        renderStats(); renderHistory();
    }

    // ==================== STATS ====================
    function loadStats() {
        const s = JSON.parse(localStorage.getItem('wg_stats') || '{}');
        totalExDone = s.totalExercises || 0;
        const last = s.lastWorkoutDate || '';
        const today = ymd();
        todayWkts = (last === today) ? (s.todaysWorkouts || 0) : 0;
    }

    function saveStats() {
        const today = ymd();
        const s = JSON.parse(localStorage.getItem('wg_stats') || '{}');
        let streak = s.streak || 0;
        const last = s.lastWorkoutDate || '';
        if (last !== today) {
            const yest = ymd(new Date(Date.now() - 864e5));
            streak = (last === yest) ? streak + 1 : 1;
        }
        todayWkts++;
        totalExDone += (workout ? workout.exercises.length : 0);
        localStorage.setItem('wg_stats', JSON.stringify({
            totalExercises: totalExDone,
            streak, lastWorkoutDate: today,
            todaysWorkouts: todayWkts,
        }));
    }

    function renderStats() {
        const s = JSON.parse(localStorage.getItem('wg_stats') || '{}');
        $('streakCount').textContent = s.streak || 0;
        $('totalWorkouts').textContent = history.length + (parseInt(localStorage.getItem('wg_total_workouts') || 0));
        $('totalReps').textContent = s.totalExercises || 0;
    }

    function ymd(d) { return (d || new Date()).toISOString().split('T')[0]; }

    // ==================== HISTORY ====================
    function loadHistory() { history = JSON.parse(localStorage.getItem('wg_history') || '[]'); }
    function saveHistory() {
        const all = JSON.parse(localStorage.getItem('wg_history') || '[]');
        if (workout) {
            all.unshift({ difficulty: workout.difficulty, count: workout.exercises.length, timestamp: new Date().toISOString() });
            if (all.length > 20) all.pop();
            localStorage.setItem('wg_history', JSON.stringify(all));
            history = all;
        }
    }
    function renderHistory() {
        const el = $('histList');
        if (!history.length) { el.innerHTML = '<p class="no-history">No workouts yet — generate your first one! 🏃</p>'; return; }
        let h = '';
        history.forEach(w => {
            const de = w.difficulty === 'easy' ? '🌱' : w.difficulty === 'medium' ? '⚡' : '💀';
            const ts = fmtTime(new Date(w.timestamp));
            h += `<div class="h-item">
                <span>${de} ${w.count} exercises</span>
                <span class="h-diff ${w.difficulty}">${w.difficulty.toUpperCase()}</span>
                <span style="font-size:0.72rem;color:#6b7280">${ts}</span>
            </div>`;
        });
        el.innerHTML = h;
    }
    function fmtTime(d) {
        const diff = Math.floor((Date.now() - d) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        return d.toLocaleDateString();
    }

    // ==================== SHORTCUT ====================
    function $(id) { return document.getElementById(id); }

    // ==================== DIFF CLICK ====================
    $('diffBar').addEventListener('click', e => {
        if (!e.target.classList.contains('diff-btn')) return;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        diff = e.target.dataset.diff;
    });

    // ==================== GENERATE ====================
    function gen() {
        if (timerOn && timerRun) { if (!confirm('Workout in progress. New one?')) return; resetTimer(); }
        const btn = $('genBtn');
        btn.classList.add('spinning');
        setTimeout(() => btn.classList.remove('spinning'), 500);

        const pool = exercises[diff];
        const count = diff === 'easy' ? 6 : diff === 'medium' ? 7 : 8;
        const sel = [...pool].sort(() => Math.random() - 0.5).slice(0, count);

        workout = { difficulty: diff, exercises: sel, timestamp: new Date().toISOString() };

        renderWorkout();
        saveHistory(); saveStats();
        renderHistory(); renderStats();
        $('actionRow').style.display = 'flex';
        if (timerOn) { resetTimerSilent(); $('timerPanel').classList.add('show'); }
        showMotto('New workout generated! 🎲');
        $('workoutSec').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function renderWorkout() {
        const dem = diff === 'easy' ? '🌱' : diff === 'medium' ? '⚡' : '💀';
        let h = `<div class="workout-top-line">
            <span class="w-title">${dem} ${diff.charAt(0).toUpperCase()+diff.slice(1)} Workout</span>
            <span class="w-badge">${workout.exercises.length} exercises</span>
        </div><ul class="ex-list">`;
        workout.exercises.forEach((ex, i) => {
            h += `<li class="ex-item" id="ex-${i}">
                <span class="ex-emoji">${ex.emoji}</span>
                <div class="ex-body">
                    <div class="ex-name">${ex.name}</div>
                    <div class="ex-detail">${ex.detail}</div>
                    <div class="ex-tip">💡 ${ex.reps}</div>
                </div>
                <div class="ex-tick" id="tick-${i}" onclick="tickEx(${i})">✅</div>
            </li>`;
        });
        h += '</ul>';
        $('workoutSec').innerHTML = h;
        $('workoutSec').classList.add('show');
    }

    // ==================== TICK ====================
    function tickEx(i) {
        const t = $('tick-'+i); if (!t) return;
        t.classList.toggle('done');
        if (t.classList.contains('done')) { t.textContent='✅'; beep('done'); checkAllDone(); }
        else t.textContent='';
    }
    function checkAllDone() {
        const all = document.querySelectorAll('.ex-tick');
        const done = Array.from(all).filter(c => c.classList.contains('done') || c.classList.contains('skipped'));
        if (done.length >= all.length * 0.75 && done.length < all.length)
            showMotto(mottoes[Math.floor(Math.random()*mottoes.length)]);
        if (done.length === all.length) { confetti(); showMotto('WORKOUT COMPLETE! 🏆🎉'); if(timerOn&&timerRun)resetTimer(); }
    }

    // ==================== TIMER ====================
    function toggleTimerMode() {
        timerOn = !timerOn;
        const t = $('timerToggle'), p = $('timerPanel');
        if (timerOn) { t.classList.add('active'); t.innerHTML='⏱️ Timer Mode: ON'; if(workout){p.classList.add('show');resetTimerSilent();} }
        else { t.classList.remove('active'); t.innerHTML='⏱️ Workout Timer Mode'; resetTimer(); p.classList.remove('show'); }
    }
    function resetTimerSilent() {
        if (!workout) return; exIdx=0; isRest=false; timerRun=false; timerPaused=false;
        if(timerInt){clearInterval(timerInt);timerInt=null;} updateTimerUI('reset'); hiEx();
    }
    function resetTimer() { resetTimerSilent(); if(workout&&timerOn)$('timerPanel').classList.add('show'); else $('timerPanel').classList.remove('show'); }
    function startTimer() {
        if(!workout){gen();return;} if(timerRun&&!timerPaused)return;
        if(!timerPaused){exIdx=0;isRest=false;timeLeft=workout.exercises[0].seconds;}
        timerRun=true;timerPaused=false;
        $('tStartBtn').style.display='none';$('tPauseBtn').style.display='inline-block';
        $('timerPanel').classList.add('show');
        hiEx();updateTimerUI('go');beep('start');
        timerInt=setInterval(()=>{timeLeft--;updateTimerUI('tick');if(timeLeft<=0){beep('switch');advance();}},1000);
    }
    function pauseTimer() {
        timerRun=false;timerPaused=true;if(timerInt){clearInterval(timerInt);timerInt=null;}
        $('tStartBtn').style.display='inline-block';$('tPauseBtn').style.display='none';
        $('tStartBtn').textContent='▶️ RESUME';updateTimerUI('pause');
    }
    function skipEx() {
        if(!workout)return;
        if(!isRest&&exIdx<workout.exercises.length){const t=$('tick-'+exIdx);if(t&&!t.classList.contains('done'))t.classList.add('skipped');}
        advance(true);
    }
    function advance(skipped=false){
        if(!workout)return;
        if(isRest){isRest=false;exIdx++;if(exIdx>=workout.exercises.length){doneWorkout();return;}
            timeLeft=workout.exercises[exIdx].seconds;hiEx();updateTimerUI('ex');showMotto(mottoes[Math.floor(Math.random()*mottoes.length)]);}
        else{if(!skipped&&exIdx<workout.exercises.length){const t=$('tick-'+exIdx);if(t){t.classList.add('done');t.textContent='✅';}}
            if(exIdx<workout.exercises.length){isRest=true;timeLeft=workout.exercises[exIdx].rest;hiEx();updateTimerUI('rest');}}
    }
    function doneWorkout(){
        resetTimerSilent();$('tStartBtn').style.display='inline-block';$('tPauseBtn').style.display='none';
        $('tStartBtn').textContent='▶️ START';$('timerPanel').classList.remove('show');
        confetti();showMotto('WORKOUT COMPLETE! 🏆🎉');
        document.querySelectorAll('.ex-tick').forEach(c=>{c.classList.add('done');c.textContent='✅';});
    }
    function hiEx(){
        document.querySelectorAll('.ex-item').forEach(e=>e.classList.remove('active','current'));
        if(workout&&exIdx<workout.exercises.length){const e=$('ex-'+exIdx);if(e){e.classList.add('active');if(!isRest)e.classList.add('current');}}
    }
    function updateTimerUI(st) {
        const nm=$('timerExName'),sub=$('timerSub'),big=$('timerBig'),bar=$('progressFill');
        const tot = workout ? workout.exercises.length : 0;
        if(!workout||exIdx>=tot){nm.textContent='All done! 🎉';sub.textContent='';big.textContent='🏆';bar.style.width='100%';bar.classList.add('done');return;}
        const ex=workout.exercises[exIdx];big.classList.remove('rest','urgent');
        if(st==='reset'){nm.textContent='Ready?';sub.textContent='Press START to begin!';big.textContent='00:00';bar.style.width='0%';}
        else if(isRest){nm.textContent='😮‍💨 Rest after: '+ex.name;sub.textContent=ex.rest+'s rest — hydrate! 💧';big.classList.add('rest');big.textContent=fSec(timeLeft);
            const pct=Math.max(0,(timeLeft/ex.rest)*100);bar.style.width=pct+'%';}
        else{nm.textContent=ex.emoji+' '+ex.name;sub.textContent=ex.detail+' · '+(exIdx+1)+'/'+tot;big.textContent=fSec(timeLeft);
            if(timeLeft<=5)big.classList.add('urgent');
            const totPct=((exIdx+(1-timeLeft/ex.seconds))/tot)*100;bar.style.width=totPct+'%';}
    }
    function fSec(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}

    // ==================== SOUND + MUSIC ====================
    function beep(type){
        if(!soundOn)return;
        try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();
            o.connect(g);g.connect(c.destination);g.gain.value=0.12;
            if(type==='start'){o.frequency.value=660;o.type='sine';}
            else if(type==='switch'){o.frequency.value=880;o.type='square';}
            else if(type==='done'){o.frequency.value=520;o.type='triangle';}
            else{o.frequency.value=440;o.type='sine';}
            o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);o.stop(c.currentTime+0.2);
        }catch(e){}
    }
    function toggleSound(){soundOn=!soundOn;$('soundBtn').textContent=soundOn?'🔊':'🔇';}
    function toggleMusic(){
        musicOn=!musicOn;
        const btn=$('musicBtn');
        if(musicOn){btn.classList.add('music-on');btn.textContent='🎵';startMusic();}
        else{btn.classList.remove('music-on');btn.textContent='🎵';stopMusic();}
    }
    function startMusic(){
        if(musicCtx)stopMusic();
        try{
            musicCtx=new(window.AudioContext||window.webkitAudioContext)();
            // Simple lo-fi workout beat — copyright-free synth
            const bpm=95,beatMs=60000/bpm;
            // Kick
            function kick(t){
                const o=musicCtx.createOscillator(),g=musicCtx.createGain();
                o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(40,t+0.1);
                g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
                o.connect(g);g.connect(musicCtx.destination);o.start(t);o.stop(t+0.25);musicNodes.push(o,g);
            }
            // Snare
            function snare(t){
                const bufferSize=musicCtx.sampleRate*0.1;
                const buffer=musicCtx.createBuffer(1,bufferSize,musicCtx.sampleRate);
                const data=buffer.getChannelData(0);
                for(let i=0;i<bufferSize;i++)data[i]=(Math.random()*2-1)*Math.exp(-i/(bufferSize*0.05));
                const s=musicCtx.createBufferSource(),g=musicCtx.createGain();
                s.buffer=buffer;g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
                s.connect(g);g.connect(musicCtx.destination);s.start(t);musicNodes.push(s,g);
            }
            // Hi-hat
            function hh(t){
                const bufferSize=musicCtx.sampleRate*0.05;
                const buffer=musicCtx.createBuffer(1,bufferSize,musicCtx.sampleRate);
                const data=buffer.getChannelData(0);
                for(let i=0;i<bufferSize;i++)data[i]=(Math.random()*2-1)*Math.exp(-i/(bufferSize*0.02));
                const s=musicCtx.createBufferSource(),g=musicCtx.createGain(),f=musicCtx.createBiquadFilter();
                f.type='highpass';f.frequency.value=7000;
                g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
                s.buffer=buffer;s.connect(f);f.connect(g);g.connect(musicCtx.destination);s.start(t);musicNodes.push(s,g,f);
            }
            function loop(){
                if(!musicOn||!musicCtx)return;
                const now=musicCtx.currentTime;
                for(let i=0;i<4;i++){
                    const t=now+i*beatMs/1000;
                    kick(t);hh(t+0.25*beatMs/1000);
                    if(i%2===0)snare(t+0.5*beatMs/1000);
                    hh(t+0.75*beatMs/1000);
                }
                // Bass synth note
                const b=musicCtx.createOscillator(),bg=musicCtx.createGain();
                b.type='triangle';b.frequency.value=55;
                bg.gain.setValueAtTime(0.1,now);bg.gain.setValueAtTime(0.1,now+beatMs*3.5/1000);
                bg.gain.linearRampToValueAtTime(0.001,now+beatMs*4/1000);
                b.connect(bg);bg.connect(musicCtx.destination);b.start(now);b.stop(now+beatMs*4/1000);
                musicNodes.push(b,bg);
                musicTimeout=setTimeout(loop,beatMs*4);
            }
            let musicTimeout;
            loop();
        }catch(e){}
    }
    function stopMusic(){
        if(musicTimeout)clearTimeout(musicTimeout);
        musicNodes.forEach(n=>{try{n.stop()}catch(e){}});musicNodes=[];
        if(musicCtx){try{musicCtx.close()}catch(e){}musicCtx=null;}
    }

    // ==================== MOTTO ====================
    let mTm;
    function showMotto(m){const e=$('motto');e.textContent=m;e.classList.add('show');clearTimeout(mTm);mTm=setTimeout(()=>e.classList.remove('show'),3000);}

    // ==================== CONFETTI ====================
    function confetti(){
        const c=$('confetti'),cols=['#4ade80','#f43f5e','#fbbf24','#8b5cf6','#38bdf8','#fb923c','#a78bfa','#34d399','#FF6B35','#ec4899'];
        for(let i=0;i<80;i++){const p=document.createElement('div');p.className='c-piece';
            p.style.left=Math.random()*100+'%';p.style.backgroundColor=cols[Math.floor(Math.random()*cols.length)];
            p.style.animationDelay=Math.random()*2+'s';p.style.width=p.style.height=(Math.random()*10+5)+'px';
            p.style.animationDuration=(Math.random()*2+2)+'s';c.appendChild(p);setTimeout(()=>p.remove(),4000);}
        beep('done');
    }

    // ==================== COPY ====================
    function copyWorkout(){
        if(!workout)return;
        let txt=`💪 My ${workout.difficulty.toUpperCase()} Workout\n━━━━━━━━━━━━━━━━\n`;
        workout.exercises.forEach((ex,i)=>{txt+=`${i+1}. ${ex.emoji} ${ex.name} — ${ex.detail}\n   💡 ${ex.reps}\n`;});
        txt+=`━━━━━━━━━━━━━━━━\nGenerated by Random Workout Generator 🎲`;
        navigator.clipboard.writeText(txt).then(()=>showMotto('✅ Copied! Share with a friend!')).catch(()=>alert(txt));
    }

    // ==================== PWA INSTALL ====================
    let dPrompt=null;
    window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dPrompt=e;$('installBtn').style.display='block';});
    function installApp(){
        if(!dPrompt){const ios=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
            alert(ios?'Tap Share (📤) → "Add to Home Screen"':'Tap menu (⋮) → "Install"');return;}
        dPrompt.prompt();dPrompt.userChoice.then(r=>{if(r.outcome==='accepted')$('installBtn').style.display='none';dPrompt=null;});
    }

    // ==================== BOOT ====================
    init();
    </script>

    <!-- Service Worker -->
    <script>
    if('serviceWorker' in navigator){
        window.addEventListener('load',()=>{navigator.serviceWorker.register('/workout-generator/sw.js')});
    }
    </script>
</body>
